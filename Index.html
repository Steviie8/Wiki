<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steven.wiki</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button type="button" class="planet top-left" onclick="openModal('rccarModal')">
        <img src="Image/blue.png" alt="RC Car" style="width: 250px; height: 250px;">
    </button>

    <button type="button" class="planet top-right" onclick="openModal('MechanicalArmModal')">
        <img src="Image/pruple.png" alt="Mechanical Arm" style="width: 350px; height: 350;">
    </button>

    <button type="button" class="planet bottom-left" onclick="openModal('ScreenModal')">
        <img src="Image/brown.png" alt="Screen" style="width: 350px; height: 350px;">
    </button>

    <button type="button" class="planet bottom-right" onclick="openModal('VideoGamesModal')">
        <img src="Image/turquoise.png" alt="Game Jam" style="width: 400px; height: 400px;">
    </button>

    <button type="button" class="planet sun sun-button" onclick="openModal('aboutMeModel')">
    <img src="Image/sun.png" alt="About Me" style="width: 650px; height: 650;">
    </button>
    <a href="https://www.instagram.com/steviie_88/">
    <button type="button" class="planet insta" style="border: none; background: none; padding: 0; cursor: pointer;"> 
        <img src="Image/insta.png" alt="insta" style="width: 100px; height: 100px;"> 
    </button>
    </a>

    <a href="https://www.linkedin.com/in/steven-xu-812a9b301/">
    <button type="button" class="planet link" style="border: none; background: none; padding: 0; cursor: pointer;"> 
        <img src="Image/linkedin.png" alt="linkedin" style="width: 125px; height: 125px;"> 
    </button>
    </a>
    <a href="https://www.tiktok.com/@steviie_">
    <button type="button" class="planet tiktok" style="border: none; background: none; padding: 0; cursor: pointer;"> 
        <img src="Image/tiktok.png" alt="tiktok" style="width: 125px; height: 125px;"> 
    </button>
    </a>

    <div class="modal-overlay" id="rccarModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('rccarModal')">✕</button>
            <h2>RC Car</h2>
        </div>
    </div>

    <div class="modal-overlay" id="VideoGamesModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('VideoGamesModal')">✕</button>
            <h2>Video Games</h2>
        </div>
    </div>

    <div class="modal-overlay" id="MechanicalArmModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('MechanicalArmModal')">✕</button>
            <h2>Mechanical Arm</h2>
        </div>
    </div>

    <div class="modal-overlay" id="ScreenModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('ScreenModal')">✕</button>
            <h2>Screen</h2>
        </div>
    </div>


    <div class="modal-overlay" id="aboutMeModel">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('aboutMeModel')">✕</button>
        <h2>About me</h2>
        <h3>Hi, I'm Steven</h3>
        <p>! I love robotics, game development, and building cool things.</p>
    </div>
</div>
    <script>
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('open');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('open');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.remove('open');
            }
        }
    </script>
</body>
</html>
