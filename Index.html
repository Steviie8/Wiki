<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steven.wiki</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button type="button" class="planet top-left" onclick="openModal('rccarModal')">
        <img src="Image/Planet.png" alt="RC Car" style="width: 50px; height: 50px;">
    </button>

    <button type="button" class="planet top-right" onclick="openModal('MechanicalArmModal')">
        <img src="Image/Planet.png" alt="Mechanical Arm" style="width: 50px; height: 50px;">
    </button>

    <button type="button" class="planet bottom-left" onclick="openModal('ScreenModal')">
        <img src="Image/Planet.png" alt="Screen" style="width: 50px; height: 50px;">
    </button>

    <button type="button" class="planet bottom-right" onclick="openModal('VideoGamesModal')">
        <img src="Image/Planet.png" alt="Game Jam" style="width: 50px; height: 50px;">
    </button>

    <div class="modal-overlay" id="rccarModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('rccarModal')">✕</button>
            <h2>RC Car</h2>
        </div>
    </div>

    <div class="modal-overlay" id="VideoGamesModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('VideoGamesModal')">✕</button>
            <h2>Video Games</h2>
        </div>
    </div>

    <div class="modal-overlay" id="MechanicalArmModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('MechanicalArmModal')">✕</button>
            <h2>Mechanical Arm</h2>
        </div>
    </div>

    <div class="modal-overlay" id="ScreenModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('ScreenModal')">✕</button>
            <h2>Screen</h2>
        </div>
    </div>

    <script>
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('open');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('open');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.remove('open');
            }
        }
    </script>
</body>
</html>
